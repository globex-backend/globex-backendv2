<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Globex OS · Sign in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#111520;border:1px solid rgba(245,166,35,.2);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;margin:16px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.ldot{width:10px;height:10px;border-radius:50%;background:#f5a623;box-shadow:0 0 10px #f5a623}
.ltx{font-size:16px;font-weight:700}
.lsub{font-size:10px;color:#475569;text-transform:uppercase}
h1{font-size:22px;font-weight:800;margin-bottom:6px;color:#f5a623}
.sub{font-size:12px;color:#94a3b8;margin-bottom:24px}
.lf{margin-bottom:14px}
label{display:block;font-size:12px;color:#94a3b8;margin-bottom:6px}
input{width:100%;background:#161c2e;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;font-size:14px;color:#e2e8f0;outline:none}
input:focus{border-color:#f5a623}
input::placeholder{color:#475569}
button{width:100%;background:#f5a623;color:#000;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
button:disabled{opacity:.7}
.err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#ff4757;margin-top:10px;display:none}
.ver{font-size:10px;color:#2d3748;text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="ldot"></div>
    <div><div class="ltx">Globex OS</div><div class="lsub">Persian Horizon · Dubai</div></div>
  </div>
  <h1>Sign in</h1>
  <div class="sub">Access is set by your organizational role.</div>
  <div class="lf">
    <label>Email</label>
    <input id="email" type="email" placeholder="name@globex.ae">
  </div>
  <div class="lf">
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••">
  </div>
  <button id="btn" onclick="doLogin()">Sign in</button>
  <div class="err" id="err"></div>
  <div class="ver">Globex OS · v5.0 · 2026</div>
</div>
<script>
const SUPABASE_URL = 'https://xqnrazhcmrytjdfruiye.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbnJhemhjbXJ5dGpkZnJ1aXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjIzMjgsImV4cCI6MjA5NzUzODMyOH0.eI7o9YDJxNzg0p1NXoD_KAWEVKHf6YsLoA3Zhi9xZrw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Please enter email and password'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  console.log('[Globex] ✅ Logged in:', data.user.email, '| Role:', data.user.app_metadata?.role);
  window.location.replace('./index_v5.html');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
